apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app: training
    method: baseline
spec:
  completions: 5
  parallelism: 1
  template:
    metadata:
      labels:
        app: training
        method: baseline
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.sh/nodepool: gpu
      containers:
        - name: training
          image: ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          command:
            - python
            - "-m"
            - src.training.train
            - --epochs
            - "${EPOCHS}"
            - --batch-size
            - "${BATCH_SIZE}"
            - --data-dir
            - /data
            - --output-dir
            - /data/profiling-results
          resources:
            requests:
              nvidia.com/gpu: 1
              memory: "${MEMORY}"
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
      restartPolicy: Never
